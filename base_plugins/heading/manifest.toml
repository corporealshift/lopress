# Built-in "base" plugin: the heading block, claiming the native core
# `heading` type. Embedded at compile time via include_str! — see
# load_base_plugins.
name = "lopress-heading"
version = "0.1.0"

[[blocks]]
name = "heading"
editor = "heading"
native = "heading"
builtin = true

[blocks.attrs]
level = { type = "number", ui = "hidden" }
