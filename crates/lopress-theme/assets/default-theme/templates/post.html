{% extends "layout.html" %}
{% block content %}
<article class="post">
  <header>
    <h1>{{ page.title }}</h1>
    {% if page.date %}<time datetime="{{ page.date }}">{{ page.date }}</time>{% endif %}
    {% if page.tags %}
      <ul class="tags">
        {% for t in page.tags %}<li><a href="/tags/{{ t }}/">{{ t }}</a></li>{% endfor %}
      </ul>
    {% endif %}
  </header>
  <div class="body">{{ page.body_html | safe }}</div>
</article>
{% endblock %}
